aid: google-blogger
name: Google Blogger
description: >-
  The Google Blogger API v3 allows you to integrate Blogger content with your
  application. You can create, read, update, and delete blogs, posts, pages,
  comments, and user information using RESTful operations with OAuth 2.0
  authentication.
